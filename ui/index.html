<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoVault Desktop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      overflow-y: auto;
      overflow-x: hidden;
      height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 20px;
      padding: 10px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    .drop-zone {
      border: 3px dashed #667eea;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #f8f9ff;
      margin-bottom: 15px;
    }

    .drop-zone:hover {
      border-color: #764ba2;
      background: #f0f2ff;
    }

    .drop-zone.active {
      border-color: #764ba2;
      background: #e8ebff;
      transform: scale(1.02);
    }

    .drop-zone svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      color: #667eea;
    }

    .drop-zone h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #333;
    }

    .drop-zone p {
      font-size: 14px;
      color: #666;
    }

    .file-info {
      background: #f8f9ff;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      display: none;
    }

    .file-info.visible {
      display: block;
    }

    .file-info h4 {
      font-size: 14px;
      color: #667eea;
      margin-bottom: 8px;
    }

    .file-info p {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #333;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .progress-container {
      display: none;
      margin-bottom: 20px;
    }

    .progress-container.visible {
      display: block;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 13px;
      color: #666;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #e0e0e0;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.visible {
      display: block;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: #667eea;
      color: white;
      margin-top: 8px;
    }

    /* Queue styles */
    .queue-container {
      background: #fff8e6;
      border: 1px solid #ffcc00;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .queue-container h4 {
      font-size: 14px;
      color: #996600;
      margin-bottom: 12px;
    }

    .queue-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .queue-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
    }

    .queue-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .queue-info strong {
      font-size: 13px;
      color: #333;
    }

    .queue-files, .queue-attempts {
      font-size: 11px;
      color: #666;
    }

    .queue-error {
      font-size: 11px;
      color: #cc0000;
    }

    .queue-buttons {
      display: flex;
      gap: 8px;
    }

    .queue-buttons button {
      flex: none;
      padding: 8px 16px;
      font-size: 12px;
    }

    .retry-btn {
      padding: 6px 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📸 PhotoVault Desktop</h1>
      <p>Fast, reliable photo uploads for photographers</p>
    </div>

    <div class="card">
      <!-- Alert Messages -->
      <div id="alert-success" class="alert alert-success">
        ✅ Upload completed successfully!
      </div>
      <div id="alert-error" class="alert alert-error">
        ❌ <span id="error-message">Upload failed</span>
      </div>

      <!-- Drop Zone -->
      <div id="drop-zone" class="drop-zone">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <h3>Drop photos or ZIP file here</h3>
        <p>or click to browse</p>
      </div>

      <!-- File Info -->
      <div id="file-info" class="file-info">
        <h4>Selected File:</h4>
        <p id="file-name">No file selected</p>
        <p id="file-size">0 MB</p>
      </div>

      <!-- Form -->
      <div class="form-group">
        <label for="gallery-name">Gallery Name</label>
        <input type="text" id="gallery-name" placeholder="Enter gallery name" />
      </div>

      <!-- Auth Button (shown when not authenticated) -->
      <div id="auth-container" class="form-group" style="display: none;">
        <button id="auth-btn" class="btn-primary" style="width: 100%;">
          Sign In to PhotoVault
        </button>
        <p style="font-size: 12px; color: #666; margin-top: 8px; text-align: center;">
          You need to sign in to upload files
        </p>
      </div>

      <!-- Progress -->
      <div id="progress-container" class="progress-container">
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <p id="progress-text" class="progress-text">Uploading... 0%</p>
      </div>

      <!-- Failed Uploads Queue -->
      <div id="queue-container" class="queue-container" style="display: none;">
        <h4>Failed Uploads</h4>
        <div id="queue-list" class="queue-list"></div>
        <div class="queue-buttons">
          <button id="retry-all-btn" class="btn-secondary">Retry All</button>
          <button id="clear-queue-btn" class="btn-secondary">Clear</button>
        </div>
      </div>

      <!-- Buttons -->
      <div class="buttons">
        <button id="upload-btn" class="btn-primary" disabled>
          Start Upload
        </button>
        <button id="cancel-btn" class="btn-secondary" disabled>
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
